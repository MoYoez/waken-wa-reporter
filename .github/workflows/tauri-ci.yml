name: Tauri CI

on:
  push:
    branches:
      - tauri-desktop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tauri-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-code:
    name: quality-code-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-linux-build-deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update

          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          SOUP_PKG="libsoup-3.0-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
            SOUP_PKG="libsoup2.4-dev"
          fi

          APPINDICATOR_PKG="libayatana-appindicator3-dev"
          if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
            APPINDICATOR_PKG="libappindicator3-dev"
          fi

          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            "$SOUP_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: enable-corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: check-rust-format
        run: cargo fmt --check
        working-directory: src-tauri

      - name: check-rust-compile
        run: cargo check
        working-directory: src-tauri

      - name: check-frontend-build
        run: pnpm build

  build-desktop:
    name: build-desktop-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: quality-code
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            tauri_args: --bundles msi,nsis
          - os: macos-latest
            name: macos
            tauri_args: --bundles dmg
          - os: ubuntu-latest
            name: linux
            tauri_args: --bundles appimage,deb

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-linux-build-deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update

          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          SOUP_PKG="libsoup-3.0-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
            SOUP_PKG="libsoup2.4-dev"
          fi

          APPINDICATOR_PKG="libayatana-appindicator3-dev"
          if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
            APPINDICATOR_PKG="libappindicator3-dev"
          fi

          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            "$SOUP_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: enable-corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: build-tauri-desktop
        id: build_tauri_desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauri_args }}

      - name: upload-desktop-artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tauri-desktop-${{ matrix.name }}
          path: ${{ join(fromJSON(steps.build_tauri_desktop.outputs.artifactPaths), '\n') }}
          if-no-files-found: error

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    needs: quality-code
    env:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: enable-corepack
        run: |
          corepack enable
          corepack prepare pnpm@${{ env.PNPM_VERSION }} --activate

      - name: install-java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: add-rust-android-targets
        run: rustup target add aarch64-linux-android

      - name: setup-android-sdk
        uses: android-actions/setup-android@v3

      - name: install-android-packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: export-ndk-home
        run: |
          NDK_PATH="$(ls -d "$ANDROID_SDK_ROOT"/ndk/* | sort -V | tail -n 1)"
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "Using NDK at: $NDK_PATH"

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: init-android-target
        run: pnpm tauri android init --ci

      - name: prepare-android-signing
        run: |
          test -n "$ANDROID_KEYSTORE"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          echo "$ANDROID_KEYSTORE" | base64 --decode > src-tauri/gen/android/release.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: inject-android-release-signing
        run: |
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          grep -q 'val keystoreProperties = Properties().apply' "$APP_GRADLE" || perl -0pi -e 's/val tauriProperties = Properties\(\)\.apply \{\n    val propFile = file\("tauri\.properties"\)\n    if \(propFile\.exists\(\)\) \{\n        propFile\.inputStream\(\)\.use \{ load\(it\) \}\n    \}\n\}\n/val tauriProperties = Properties().apply {\n    val propFile = file("tauri.properties")\n    if (propFile.exists()) {\n        propFile.inputStream().use { load(it) }\n    }\n}\n\nval keystoreProperties = Properties().apply {\n    val propFile = rootProject.file("keystore.properties")\n    if (propFile.exists()) {\n        propFile.inputStream().use { load(it) }\n    }\n}\n/' "$APP_GRADLE"
          grep -q 'signingConfigs' "$APP_GRADLE" || perl -0pi -e 's/android \{\n/android {\n    signingConfigs {\n        create("release") {\n            storeFile = rootProject.file(keystoreProperties.getProperty("storeFile"))\n            storePassword = keystoreProperties.getProperty("storePassword")\n            keyAlias = keystoreProperties.getProperty("keyAlias")\n            keyPassword = keystoreProperties.getProperty("keyPassword")\n        }\n    }\n/' "$APP_GRADLE"
          perl -0pi -e 's/getByName\("release"\) \{\n            isMinifyEnabled = true/getByName("release") {\n            signingConfig = signingConfigs.getByName("release")\n            isMinifyEnabled = true/' "$APP_GRADLE"

      - name: normalize-android-sdk-level
        run: |
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 35/' "$APP_GRADLE"
          sed -i 's/targetSdk = [0-9]\+/targetSdk = 35/' "$APP_GRADLE"
          grep -nE "compileSdk|targetSdk" "$APP_GRADLE"

      - name: build-android-apk-release
        run: pnpm tauri android build --ci --apk --target aarch64

      - name: upload-android-artifacts
        uses: actions/upload-artifact@v6
        with:
          name: tauri-android-artifacts
          path: |
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          if-no-files-found: error
