name: Tauri CI

on:
  push:
    branches:
      - tauri-desktop
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tauri-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  APP_BASENAME: "waken-wa-reporter"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality-code:
    name: quality-code-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: ubuntu-latest
            name: linux

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-linux-build-deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update

          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          SOUP_PKG="libsoup-3.0-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
            SOUP_PKG="libsoup2.4-dev"
          fi

          APPINDICATOR_PKG="libayatana-appindicator3-dev"
          if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
            APPINDICATOR_PKG="libappindicator3-dev"
          fi

          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            "$SOUP_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: install-pnpm
        run: |
          npm install --global pnpm@${{ env.PNPM_VERSION }}

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: check-rust-format
        run: cargo fmt --check
        working-directory: src-tauri

      - name: check-rust-compile
        run: cargo check
        working-directory: src-tauri

      - name: check-frontend-build
        run: pnpm build

  build-desktop:
    name: build-desktop-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    needs: quality-code
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            platform: windows
            arch: x64
            tauri_args: --bundles msi,nsis
          - os: macos-latest
            name: macos
            platform: macos
            arch: arm64
            tauri_args: --bundles dmg
          - os: ubuntu-latest
            name: linux
            platform: linux
            arch: x64
            tauri_args: --bundles appimage,deb

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-linux-build-deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update

          WEBKIT_PKG="libwebkit2gtk-4.1-dev"
          SOUP_PKG="libsoup-3.0-dev"
          if ! apt-cache show "$WEBKIT_PKG" >/dev/null 2>&1; then
            WEBKIT_PKG="libwebkit2gtk-4.0-dev"
            SOUP_PKG="libsoup2.4-dev"
          fi

          APPINDICATOR_PKG="libayatana-appindicator3-dev"
          if ! apt-cache show "$APPINDICATOR_PKG" >/dev/null 2>&1; then
            APPINDICATOR_PKG="libappindicator3-dev"
          fi

          sudo apt-get install -y \
            libgtk-3-dev \
            "$WEBKIT_PKG" \
            "$SOUP_PKG" \
            "$APPINDICATOR_PKG" \
            librsvg2-dev \
            patchelf

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: install-pnpm
        run: |
          npm install --global pnpm@${{ env.PNPM_VERSION }}

      - name: install-macos-dmg-build-deps
        if: matrix.os == 'macos-latest'
        run: |
          if ! brew list coreutils >/dev/null 2>&1; then
            brew install coreutils
          fi

          COREUTILS_BIN="$(brew --prefix coreutils)/libexec/gnubin"
          echo "$COREUTILS_BIN" >> "$GITHUB_PATH"
          "$COREUTILS_BIN/du" --version | head -n 1

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: export-package-version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: build-tauri-desktop
        id: build_tauri_desktop
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauri_args }}
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('Waken-Wa Reporter {0}', github.ref_name) || '' }}
          releaseBody: ${{ startsWith(github.ref, 'refs/tags/') && format('Release {0}', github.ref_name) || '' }}
          uploadUpdaterJson: true
          releaseAssetNamePattern: ${{ env.APP_BASENAME }}-[version]-${{ matrix.platform }}-${{ matrix.arch }}[ext]

      - name: rename-desktop-packages
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist-packages
          shopt -s nullglob

          files=()
          case "${{ matrix.name }}" in
            windows)
              files+=(src-tauri/target/release/bundle/msi/*.msi)
              files+=(src-tauri/target/release/bundle/msi/*.msi.sig)
              files+=(src-tauri/target/release/bundle/nsis/*.exe)
              files+=(src-tauri/target/release/bundle/nsis/*.exe.sig)
              ;;
            macos)
              files+=(src-tauri/target/release/bundle/dmg/*.dmg)
              files+=(src-tauri/target/release/bundle/macos/*.tar.gz)
              files+=(src-tauri/target/release/bundle/macos/*.tar.gz.sig)
              ;;
            linux)
              files+=(src-tauri/target/release/bundle/deb/*.deb)
              files+=(src-tauri/target/release/bundle/appimage/*.AppImage)
              files+=(src-tauri/target/release/bundle/appimage/*.AppImage.sig)
              ;;
          esac

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No desktop packages were found for ${{ matrix.name }}." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            if [[ "$file" == *.AppImage.sig ]]; then
              extension="AppImage.sig"
            elif [[ "$file" == *.tar.gz.sig ]]; then
              extension="tar.gz.sig"
            elif [[ "$file" == *.tar.gz ]]; then
              extension="tar.gz"
            elif [[ "$file" == *.msi.sig ]]; then
              extension="msi.sig"
            elif [[ "$file" == *.exe.sig ]]; then
              extension="exe.sig"
            else
              extension="${file##*.}"
            fi

            if [[ "$file" == *.AppImage ]]; then
              extension="AppImage"
            fi

            target="dist-packages/${APP_BASENAME}-${PACKAGE_VERSION}-${{ matrix.platform }}-${{ matrix.arch }}.${extension}"
            mv "$file" "$target"
            echo "$target"
          done

          ls -la dist-packages

      - name: upload-desktop-artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_BASENAME }}-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist-packages/*
          if-no-files-found: error
          compression-level: 0

  build-android:
    name: build-android
    runs-on: ubuntu-latest
    needs: quality-code
    env:
      ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: checkout-code
        uses: actions/checkout@v6

      - name: install-nodejs
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: install-pnpm
        run: |
          npm install --global pnpm@${{ env.PNPM_VERSION }}

      - name: install-java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: add-rust-android-targets
        run: rustup target add aarch64-linux-android

      - name: setup-android-sdk
        uses: android-actions/setup-android@v3

      - name: install-android-packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: export-ndk-home
        run: |
          NDK_PATH="$(ls -d "$ANDROID_SDK_ROOT"/ndk/* | sort -V | tail -n 1)"
          echo "NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> "$GITHUB_ENV"
          echo "Using NDK at: $NDK_PATH"

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: export-package-version
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: init-android-target
        run: pnpm tauri android init --ci

      - name: prepare-android-signing
        run: |
          test -n "$ANDROID_KEYSTORE"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          echo "$ANDROID_KEYSTORE" | base64 --decode > src-tauri/gen/android/release.jks
          cat > src-tauri/gen/android/keystore.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: inject-android-release-signing
        run: |
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          grep -q 'val keystoreProperties = Properties().apply' "$APP_GRADLE" || perl -0pi -e 's/val tauriProperties = Properties\(\)\.apply \{\n    val propFile = file\("tauri\.properties"\)\n    if \(propFile\.exists\(\)\) \{\n        propFile\.inputStream\(\)\.use \{ load\(it\) \}\n    \}\n\}\n/val tauriProperties = Properties().apply {\n    val propFile = file("tauri.properties")\n    if (propFile.exists()) {\n        propFile.inputStream().use { load(it) }\n    }\n}\n\nval keystoreProperties = Properties().apply {\n    val propFile = rootProject.file("keystore.properties")\n    if (propFile.exists()) {\n        propFile.inputStream().use { load(it) }\n    }\n}\n/' "$APP_GRADLE"
          grep -q 'signingConfigs' "$APP_GRADLE" || perl -0pi -e 's/android \{\n/android {\n    signingConfigs {\n        create("release") {\n            storeFile = rootProject.file(keystoreProperties.getProperty("storeFile"))\n            storePassword = keystoreProperties.getProperty("storePassword")\n            keyAlias = keystoreProperties.getProperty("keyAlias")\n            keyPassword = keystoreProperties.getProperty("keyPassword")\n        }\n    }\n/' "$APP_GRADLE"
          perl -0pi -e 's/getByName\("release"\) \{\n            isMinifyEnabled = true/getByName("release") {\n            signingConfig = signingConfigs.getByName("release")\n            isMinifyEnabled = true/' "$APP_GRADLE"

      - name: normalize-android-sdk-level
        run: |
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          sed -i 's/compileSdk = [0-9]\+/compileSdk = 35/' "$APP_GRADLE"
          sed -i 's/targetSdk = [0-9]\+/targetSdk = 35/' "$APP_GRADLE"
          grep -nE "compileSdk|targetSdk" "$APP_GRADLE"

      - name: build-android-apk-release
        run: pnpm tauri android build --ci --apk --target aarch64

      - name: rename-android-packages
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist-packages
          shopt -s globstar nullglob

          files=(
            src-tauri/gen/android/app/build/outputs/**/*.apk
            src-tauri/gen/android/app/build/outputs/**/*.aab
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No Android packages were found." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            extension="${file##*.}"
            target="dist-packages/${APP_BASENAME}-${PACKAGE_VERSION}-android-arm64.${extension}"
            mv "$file" "$target"
            echo "$target"
          done

          ls -la dist-packages

      - name: upload-android-artifacts
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.APP_BASENAME }}-android-arm64
          path: dist-packages/*
          if-no-files-found: error
          compression-level: 0

      - name: upload-android-release-assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-packages/*
