name: iOS CI

on:
  push:
    branches:
      - tauri-desktop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  build-ios:
    name: build-ios
    runs-on: macos-latest
    env:
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_P8_SECRET: ${{ secrets.APPLE_P8_SECRET }}
      IOS_DEVELOPMENT_TEAM: ${{ vars.IOS_DEVELOPMENT_TEAM }}

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: validate-ios-secrets
        shell: bash
        run: |
          missing=0

          if [ -z "$APPLE_API_ISSUER" ]; then
            echo "Missing required secret: APPLE_API_ISSUER" >&2
            missing=1
          fi

          if [ -z "$APPLE_API_KEY" ]; then
            echo "Missing required secret: APPLE_API_KEY" >&2
            missing=1
          fi

          if [ -z "$APPLE_P8_SECRET" ]; then
            echo "Missing required secret: APPLE_P8_SECRET" >&2
            missing=1
          fi

          if [ -z "$IOS_DEVELOPMENT_TEAM" ]; then
            echo "Missing required repository variable: IOS_DEVELOPMENT_TEAM" >&2
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: install-pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: install-nodejs
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: install-rust-toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: rust-cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: install-frontend-dependencies
        run: pnpm install --frozen-lockfile

      - name: show-xcode-version
        run: xcodebuild -version

      - name: write-app-store-connect-key
        shell: bash
        run: |
          APPLE_KEY_FILE="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_P8_SECRET" > "$APPLE_KEY_FILE"
          chmod 600 "$APPLE_KEY_FILE"
          echo "APPLE_API_KEY_PATH=$APPLE_KEY_FILE" >> "$GITHUB_ENV"

      - name: inject-ios-development-team
        shell: bash
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const path = 'src-tauri/tauri.conf.ci.json';
          const config = JSON.parse(fs.readFileSync(path, 'utf8'));
          config.bundle ??= {};
          config.bundle.iOS ??= {};
          config.bundle.iOS.developmentTeam = process.env.IOS_DEVELOPMENT_TEAM;
          fs.writeFileSync(path, `${JSON.stringify(config, null, 2)}\n`);
          EOF

      - name: init-ios-target
        run: pnpm tauri ios init --ci --config src-tauri/tauri.conf.ci.json

      - name: build-ios-app
        run: pnpm tauri ios build --config src-tauri/tauri.conf.ci.json --method app-store-connect

      - name: upload-ios-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-ios-artifacts
          path: |
            src-tauri/gen/apple/build/**/*.ipa
            src-tauri/gen/apple/build/**/*.xcarchive
            src-tauri/gen/apple/build/**/*.app
            src-tauri/gen/apple/build/**/*.dSYM
          if-no-files-found: error
